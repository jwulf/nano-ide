[package]
name = "rust-starter"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rust-starter"
path = "src/main.rs"

[dependencies]
# Official Camunda 8 Orchestration Cluster REST API SDK. Auto-detects a Nano
# gateway (GET /v2/topology) and upgrades create + job push to the command-stream
# / Falcon transport; the same code runs on plain REST against stock Camunda 8.
camunda-orchestration-sdk = "0.2"
tokio = { version = "1", features = ["full"] }
serde_json = "1"

[profile.release]
opt-level = 3
