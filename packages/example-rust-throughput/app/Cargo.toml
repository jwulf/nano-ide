[package]
name = "rust-throughput"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rust-throughput"
path = "src/main.rs"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart"] }
tokio = { version = "1", features = ["full"] }
serde_json = "1"

[profile.release]
opt-level = 3
