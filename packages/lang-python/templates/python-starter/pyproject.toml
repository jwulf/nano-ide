[project]
name = "python-starter"
version = "0.1.0"
description = "Camunda 8 starter — hello + job worker on the official Python SDK."
requires-python = ">=3.10"
dependencies = [
    # Official Camunda 8 Orchestration Cluster REST API SDK.
    # Auto-detects a Nano gateway and upgrades to the Falcon transport; runs on
    # plain REST against stock Camunda 8. Major n -> server 8.n (9.x -> 8.9).
    "camunda-orchestration-sdk>=9,<10",
]

[tool.uv]
package = false
